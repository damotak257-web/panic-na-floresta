name: Build PS2 Game

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Esta imagem é mantida pela comunidade e tem o compilador PS2SDK pronto
      image: ps2dev/ps2dev:latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Project
      run: |
        # O PS2SDK já está configurado nesta imagem
        make clean
        make

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Panico_na_Floresta_PS2
        path: |
          *.elf
          *.iso
          build/
